name: Build LoganOS APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "APK sürümü örn: 1.0.0-beta.3.5.3"
        required: true
        default: "1.0.0-beta.3.5.3"
      apk_name:
        description: "APK adı örn: LoganOS-v1.0.0-beta.3.5.3-debug.apk"
        required: true
        default: "LoganOS-v1.0.0-beta.3.5.3-debug.apk"
      artifact_name:
        description: "Artifact adı örn: LoganOS-v1.0.0-beta.3.5.3-apk"
        required: true
        default: "LoganOS-v1.0.0-beta.3.5.3-apk"

jobs:
  build:
    name: Build LoganOS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Show requested version
        run: |
          echo "Version: ${{ github.event.inputs.version_name }}"
          echo "APK name: ${{ github.event.inputs.apk_name }}"
          echo "Artifact: ${{ github.event.inputs.artifact_name }}"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${{ github.event.inputs.apk_name }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: dist/${{ github.event.inputs.apk_name }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LoganOS-build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
