name: Publish Secure LoganOS Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Sürüm notları
        required: true
        type: string
      confirm:
        description: Yayınlamak için tam olarak PUBLISH yaz
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: loganos-production-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify and publish signed APK
    if: inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest

    # Bu environment GitHub Settings > Environments altında oluşturulmalı.
    # İmzalama secret'ları yalnız burada tutulmalı ve mümkünse Required reviewers açılmalı.
    environment: release-signing

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2


      - name: Prepare source
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "settings.gradle.kts" ] || [ -f "settings.gradle" ]; then
            echo "gradle_root=." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | sort -V | tail -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No Gradle project and no source ZIP found."
            exit 1
          fi

          rm -rf extracted
          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted
          SETTINGS_FILE=$(find extracted -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "No Gradle settings file found inside ZIP."
            exit 1
          fi
          echo "gradle_root=$(dirname "$SETTINGS_FILE")" >> "$GITHUB_OUTPUT"

      - name: Prepare release signing key
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.LOGANOS_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.LOGANOS_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LOGANOS_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LOGANOS_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in "$KEYSTORE_B64" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            if [ -z "$value" ]; then
              echo "Release-signing environment secrets are incomplete."
              exit 1
            fi
          done
          KEYSTORE_PATH="$RUNNER_TEMP/loganos-release.jks"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "LOGANOS_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "LOGANOS_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "LOGANOS_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "LOGANOS_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Read app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_FILE="${{ steps.prep.outputs.gradle_root }}/app/build.gradle.kts"
          VERSION_NAME=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' "$GRADLE_FILE" | head -n 1)
          VERSION_CODE=$(sed -n 's/.*versionCode = \([0-9]*\).*/\1/p' "$GRADLE_FILE" | head -n 1)
          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Version metadata could not be read."
            exit 1
          fi
          if ! [[ "$VERSION_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Unsafe versionName: $VERSION_NAME"
            exit 1
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Refuse duplicate tag or release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          ENCODED_TAG=${TAG//\//%2F}
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${ENCODED_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            exit 1
          fi

      - name: Build signed release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.prep.outputs.gradle_root }}"
          gradle assembleRelease --stacktrace

      - name: Collect APK and checksum
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          SOURCE_APK="${{ steps.prep.outputs.gradle_root }}/app/build/outputs/apk/release/app-release.apk"
          TARGET_APK="dist/LoganOS-v${VERSION_NAME}-release.apk"
          test -f "$SOURCE_APK"
          cp "$SOURCE_APK" "$TARGET_APK"
          (cd dist && sha256sum "$(basename "$TARGET_APK")" > "$(basename "$TARGET_APK").sha256")

      - name: Verify APK signature and package
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          APK="dist/LoganOS-v${VERSION_NAME}-release.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          AAPT=$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)
          test -n "$APKSIGNER"
          test -n "$AAPT"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee "dist/LoganOS-v${VERSION_NAME}-release.certificate.txt"
          "$AAPT" dump badging "$APK" | tee "dist/LoganOS-v${VERSION_NAME}-release.badging.txt"
          grep -q "package: name='com.dcui.loganos'" "dist/LoganOS-v${VERSION_NAME}-release.badging.txt"
          grep -q "versionName='${VERSION_NAME}'" "dist/LoganOS-v${VERSION_NAME}-release.badging.txt"

      - name: Generate GitHub build provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/LoganOS-v${{ steps.version.outputs.name }}-release.apk

      - name: Create immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail
          APK="dist/LoganOS-v${VERSION_NAME}-release.apk"
          SHA="${APK}.sha256"
          CERT="dist/LoganOS-v${VERSION_NAME}-release.certificate.txt"
          BADGING="dist/LoganOS-v${VERSION_NAME}-release.badging.txt"

          EXTRA_ARGS=()
          if [[ "$VERSION_NAME" == *"beta"* || "$VERSION_NAME" == *"alpha"* || "$VERSION_NAME" == *"rc"* ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            "$APK" "$SHA" "$CERT" "$BADGING" \
            --target "$GITHUB_SHA" \
            --title "LoganOS v${VERSION_NAME}" \
            --notes "$RELEASE_NOTES" \
            "${EXTRA_ARGS[@]}"

      - name: Remove signing key from runner
        if: always()
        shell: bash
        run: |
          rm -f "${LOGANOS_KEYSTORE_PATH:-}"
